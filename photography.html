<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --accent: #8c7e6d; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        
        /* Background updated to p7.jpg */
        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; }
        .bg-container img { 
            width: 110%; 
            height: 110%; 
            object-fit: cover; 
            opacity: 0.35; /* Adjusted opacity for better visibility of p7 */
            filter: brightness(0.4) grayscale(20%); 
            position: absolute; 
            top: -5%; 
            left: -5%; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, #000 98%); z-index: -1; pointer-events: none; }

        .navbar { position: fixed; top: 0; width: 100%; padding: 40px; display: flex; justify-content: space-between; z-index: 1000; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 5px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; transition: 0.4s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .page-header { padding: 160px 0 60px; text-align: center; }
        h1.big-title { font-family: 'Cormorant Garamond', serif; font-size: 8.5vw; font-weight: 300; text-transform: uppercase; letter-spacing: 20px; margin: 0; }
        .char { display: inline-block; opacity: 0; transform: translateY(40px); white-space: pre; }

        .gallery-container { padding: 0 5% 120px; width: 100%; }
        .row { display: flex; justify-content: space-between; margin-bottom: 100px; width: 100%; align-items: stretch; }
        
        /* Uniform Heights */
        .row-2 { gap: 40px; height: 500px; }
        .row-3 { gap: 25px; height: 400px; }
        .row-5 { gap: 12px; height: 220px; }

        .gallery-item { opacity: 0; transform: translateY(40px); overflow: hidden; }
        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border: 1px solid rgba(255,255,255,0.08); 
            display: block; 
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        .gallery-item img:hover { transform: scale(1.04); }

        .w-2 { width: 48%; }
        .w-3 { width: 32%; }
        .w-5 { width: 19%; }

        .item-caption { margin-top: 12px; color: var(--accent); font-family: 'Cormorant Garamond', serif; letter-spacing: 2px; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="parallax-bg" src="p7.jpg">
        <div class="overlay"></div>
    </div>

    <nav class="navbar">
        <div class="logo">AURA<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-header"><h1 class="big-title" id="anim-title">Photography</h1></div>

    <div class="gallery-container">
        
        <div class="row row-2">
            <div class="gallery-item w-2">
                <img src="p9.jpg">
                <div class="item-caption">Entry // 01</div>
            </div>
            <div class="gallery-item w-2">
                <img src="p7.jpg">
                <div class="item-caption">Entry // 02</div>
            </div>
        </div>

        <div class="row row-3">
            <div class="gallery-item w-3"><img src="p14.jpg"></div>
            <div class="gallery-item w-3"><img src="p16.jpg"></div>
            <div class="gallery-item w-3"><img src="p18.jpeg"></div>
        </div>

        <div class="row row-5">
            <div class="gallery-item w-5"><img src="p13.jpg"></div>
            <div class="gallery-item w-5"><img src="p19.jpeg"></div>
            <div class="gallery-item w-5"><img src="p17.jpg"></div>
            <div class="gallery-item w-5"><img src="p15.jpg"></div>
            <div class="gallery-item w-5"><img src="p20.jpeg"></div>
        </div>

        <div class="row row-3">
            <div class="gallery-item w-3"><img src="p6.JPG"></div>
            <div class="gallery-item w-3"><img src="p10.JPG"></div>
            <div class="gallery-item w-3"><img src="p11.JPG"></div>
        </div>

        <div class="row row-2">
            <div class="gallery-item w-2">
                <img src="p8.JPG">
                <div class="item-caption">Finale // 01</div>
            </div>
            <div class="gallery-item w-2">
                <img src="p12.JPG">
                <div class="item-caption">Finale // 02</div>
            </div>
        </div>

    </div>

    <script>
        window.onload = () => {
            gsap.registerPlugin(ScrollTrigger);
            
            // Subtle parallax for the p7 background
            window.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 20; 
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                gsap.to("#parallax-bg", { x: x, y: y, duration: 2, ease: "power1.out" });
            });

            const title = document.getElementById('anim-title');
            title.innerHTML = title.innerText.split("").map(c => c === " " ? "&nbsp;" : `<span class='char'>${c}</span>`).join("");
            gsap.to(".char", { opacity: 1, y: 0, stagger: 0.08, duration: 1.2, ease: "expo.out", delay: 0.4 });

            gsap.utils.toArray(".gallery-item").forEach((item) => {
                gsap.to(item, { 
                    scrollTrigger: { 
                        trigger: item, 
                        start: "top 92%", 
                        toggleActions: "play none none none" 
                    }, 
                    opacity: 1, 
                    y: 0, 
                    duration: 1, 
                    ease: "power2.out" 
                });
            });
        };
    </script>
</body>
</html>
